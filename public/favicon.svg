<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Sunset Gradient for stroke/fill -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <!-- Background Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background circle with dark theme and sunset border -->
  <circle cx="16" cy="16" r="15" fill="#090d16" stroke="url(#sunsetGrad)" stroke-width="1.5"/>
  
  <!-- Subtle radial glow inside the circle -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>

  <!-- Shield Shape (Administration) -->
  <path d="M 16 7 C 19 8 23 9.5 24 10.5 C 24 14.5 23.5 19.5 16 25 C 8.5 19.5 8 14.5 8 10.5 C 9 9.5 13 8 16 7 Z" 
        stroke="url(#sunsetGrad)" 
        stroke-width="1.8" 
        stroke-linecap="round"
        stroke-linejoin="round" 
        fill="none"/>

  <!-- Dumbbell Shape (Fitness) inside shield -->
  <!-- Dumbbell Bar -->
  <line x1="12" y1="16" x2="20" y2="16" stroke="url(#sunsetGrad)" stroke-width="2" stroke-linecap="round" />
  
  <!-- Dumbbell Weights -->
  <!-- Left Weight Outer -->
  <rect x="10.5" y="12" width="1.5" height="8" rx="0.5" fill="url(#sunsetGrad)" />
  <!-- Left Weight Inner -->
  <rect x="12" y="13.5" width="1" height="5" rx="0.3" fill="url(#sunsetGrad)" opacity="0.9" />
  
  <!-- Right Weight Inner -->
  <rect x="19" y="13.5" width="1" height="5" rx="0.3" fill="url(#sunsetGrad)" opacity="0.9" />
  <!-- Right Weight Outer -->
  <rect x="20" y="12" width="1.5" height="8" rx="0.5" fill="url(#sunsetGrad)" />
</svg>
